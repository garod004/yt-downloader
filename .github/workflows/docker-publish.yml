name: Publicar imagens Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Video Downloader (código na raiz) ──────────────────────────────────────
  video-downloader:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — video-downloader
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/yt-downloader:latest
          cache-from: type=gha,scope=video-downloader
          cache-to: type=gha,scope=video-downloader,mode=max

  # ── Real Assessoria (código em realassessoria/) ───────────────────────────
  realassessoria:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — realassessoria
        uses: docker/build-push-action@v5
        with:
          context: ./realassessoria
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/realassessoria:latest
          cache-from: type=gha,scope=realassessoria
          cache-to: type=gha,scope=realassessoria,mode=max

  # ── File Converter (código em file-converter/) ─────────────────────────────
  file-converter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — file-converter
        uses: docker/build-push-action@v5
        with:
          context: ./file-converter
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/file-converter:latest
          cache-from: type=gha,scope=file-converter
          cache-to: type=gha,scope=file-converter,mode=max
