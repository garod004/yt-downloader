<!-- Modal Pop-up com Abas de Documentos -->
<div id="modalDocumentos" class="modal-overlay">
    <div class="modal-container">
        <!-- Cabeçalho do Modal -->
        <div class="modal-header">
            <h2>Gerar Documentos</h2>
            <button class="modal-close" onclick="fecharModalDocumentos()">&times;</button>
        </div>

        <!-- Seções de Documentos -->
        <div class="documentos-grid"></div>

        <!-- Rodapé do Modal -->
        <div class="modal-footer">
            <button class="btn-secondary" onclick="fecharModalDocumentos()">Fechar</button>
        </div>
    </div>
</div>
