<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#aa0000"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Fundo vermelho arredondado -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#bg)"/>
  <!-- Brilho sutil no topo -->
  <rect width="100" height="50" rx="22" ry="22" fill="url(#shine)"/>

  <!-- Triângulo de play (branco) -->
  <polygon points="36,28 36,62 68,45" fill="white" opacity="0.95"/>

  <!-- Linha base do download -->
  <line x1="32" y1="76" x2="68" y2="76" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Seta de download (↓) -->
  <line x1="50" y1="62" x2="50" y2="73" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.9"/>
  <polyline points="42,66 50,74 58,66" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
